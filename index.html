<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    
<title>TestLab</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<h1 class="main-title">TestLab</h1>

<div class="container">

<div id="startScreen">

<p class="select-text">Elige asignatura</p>

<div class="subject-buttons">

<button onclick="startTest('lineas')">
Líneas Aéreas de Alta Tensión
</button>

<button onclick="startTest('seguridad')">
Seguridad y Salud
</button>

</div>

</div>


<div id="quizScreen" style="display:none">

<h2 id="subjectTitle"></h2>

<div class="progress" id="progress"></div>

<div id="question"></div>

<div class="answers" id="answers"></div>

<div class="explanation" id="explanation" style="display:none"></div>

<button id="nextBtn" onclick="nextQuestion()" style="display:none">
Siguiente
</button>

</div>


<div id="resultScreen" style="display:none">

<h1>Resultado</h1>

<div id="score"></div>

<button onclick="repeatTest()">Hacer otro test</button>

<button onclick="goMenu()">Volver al menú</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
